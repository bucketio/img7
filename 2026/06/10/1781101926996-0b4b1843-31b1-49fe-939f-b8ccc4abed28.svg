<svg width="1200" height="900" viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Type-C 线购买决策图</title>
  <desc id="desc">根据手机充电、笔记本充电、大文件传输和外接显示器需求选择 Type-C 线</desc>
  <rect width="1200" height="900" fill="#ffffff"/>
  <text x="70" y="80" fill="#111827" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="44" font-weight="700">买 Type-C 线前，先看使用场景</text>
  <text x="72" y="126" fill="#475569" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="24">不要只看接口，先确定你要它完成什么任务</text>
  <g font-family="Arial, 'Microsoft YaHei', sans-serif">
    <g transform="translate(410 170)">
      <rect width="380" height="94" rx="18" fill="#111827"/>
      <text x="190" y="40" text-anchor="middle" fill="#ffffff" font-size="26" font-weight="700">你主要用它做什么？</text>
      <text x="190" y="70" text-anchor="middle" fill="#cbd5e1" font-size="20">先按场景，不按价格</text>
    </g>
    <g fill="none" stroke="#94a3b8" stroke-width="4" stroke-linecap="round">
      <path d="M600 264 L220 340"/>
      <path d="M600 264 L475 340"/>
      <path d="M600 264 L725 340"/>
      <path d="M600 264 L980 340"/>
    </g>
    <g transform="translate(70 340)">
      <rect width="300" height="210" rx="18" fill="#ecfdf5" stroke="#99f6e4"/>
      <text x="30" y="50" fill="#065f46" font-size="28" font-weight="700">只给手机充电</text>
      <text x="30" y="94" fill="#334155" font-size="22">普通 60W 线通常够用</text>
      <text x="30" y="130" fill="#334155" font-size="22">重点看长度和耐用度</text>
      <text x="30" y="166" fill="#334155" font-size="22">不用盲目买全功能线</text>
    </g>
    <g transform="translate(450 340)">
      <rect width="300" height="210" rx="18" fill="#eff6ff" stroke="#bfdbfe"/>
      <text x="30" y="50" fill="#1d4ed8" font-size="28" font-weight="700">要充笔记本</text>
      <text x="30" y="94" fill="#334155" font-size="22">优先看 100W / 240W</text>
      <text x="30" y="130" fill="#334155" font-size="22">确认 PD 功率标注</text>
      <text x="30" y="166" fill="#334155" font-size="22">高功率线看 E-Marker</text>
    </g>
    <g transform="translate(830 340)">
      <rect width="300" height="210" rx="18" fill="#f5f3ff" stroke="#ddd6fe"/>
      <text x="30" y="50" fill="#6d28d9" font-size="28" font-weight="700">传大文件</text>
      <text x="30" y="94" fill="#334155" font-size="22">看 USB 3.x / USB4</text>
      <text x="30" y="130" fill="#334155" font-size="22">别买只支持 USB 2.0</text>
      <text x="30" y="166" fill="#334155" font-size="22">移动硬盘尤其要注意</text>
    </g>
    <g transform="translate(260 630)">
      <rect width="300" height="210" rx="18" fill="#fff7ed" stroke="#fed7aa"/>
      <text x="30" y="50" fill="#c2410c" font-size="28" font-weight="700">接显示器/扩展坞</text>
      <text x="30" y="94" fill="#334155" font-size="22">确认支持视频输出</text>
      <text x="30" y="130" fill="#334155" font-size="22">看 DP Alt / 雷电 / USB4</text>
      <text x="30" y="166" fill="#334155" font-size="22">别只看“快充”字样</text>
    </g>
    <g transform="translate(640 630)">
      <rect width="300" height="210" rx="18" fill="#f8fafc" stroke="#cbd5e1"/>
      <text x="30" y="50" fill="#111827" font-size="28" font-weight="700">还要看线长</text>
      <text x="30" y="94" fill="#334155" font-size="22">越长越考验稳定性</text>
      <text x="30" y="130" fill="#334155" font-size="22">高速和视频场景别贪便宜</text>
      <text x="30" y="166" fill="#334155" font-size="22">桌面固定使用选耐用款</text>
    </g>
  </g>
</svg>
