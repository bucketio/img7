<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420" role="img" aria-labelledby="title desc">
  <title id="title">开启更新的成本和收益</title>
  <desc id="desc">天平左侧是安全和修复收益，右侧是重启、网络和空间成本。</desc>
  <rect width="900" height="420" fill="#f5f6fa"/>
  <text x="55" y="62" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="32" font-weight="700" fill="#18202b">开启更新有成本，但收益通常更关键</text>
  <line x1="450" y1="125" x2="450" y2="315" stroke="#34465c" stroke-width="8" stroke-linecap="round"/>
  <line x1="300" y1="155" x2="600" y2="155" stroke="#34465c" stroke-width="8" stroke-linecap="round"/>
  <path d="M260 165l-80 120h160l-80-120Z" fill="#e8f8f1" stroke="#3aa36d" stroke-width="4"/>
  <path d="M640 165l-80 120h160l-80-120Z" fill="#fff2e1" stroke="#e38c35" stroke-width="4"/>
  <rect x="385" y="315" width="130" height="24" rx="12" fill="#34465c"/>
  <g font-family="Arial, 'Microsoft YaHei', sans-serif" text-anchor="middle">
    <text x="260" y="222" font-size="23" font-weight="700" fill="#216647">安全补丁</text>
    <text x="260" y="254" font-size="20" fill="#216647">问题修复</text>
    <text x="640" y="215" font-size="23" font-weight="700" fill="#8b511e">需要重启</text>
    <text x="640" y="247" font-size="20" fill="#8b511e">占用空间</text>
    <text x="450" y="382" font-size="24" font-weight="700" fill="#18202b">关键不是躲开更新，而是安排好更新时间</text>
  </g>
</svg>
